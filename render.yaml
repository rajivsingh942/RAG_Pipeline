# ============================================================================
# RENDER DEPLOYMENT - Smart RAG Pipeline
# ============================================================================
# This file configures deployment on Render.com
# 
# HOW TO USE:
# 1. Push this repo to GitHub (or GitLab)
# 2. Go to https://dashboard.render.com
# 3. Click "New +" → "Web Service"
# 4. Select your GitHub repo
# 5. Render will auto-detect this render.yaml file
# 6. Fill in environment variables (see below)
# 7. Click "Deploy"
# ============================================================================

services:
  - type: web
    name: smart-rag-app
    env: docker
    plan: standard
    region: oregon  # Change to preferred region (oregon, frankfurt, singapore, etc.)
    
    # GitHub repo details (Render auto-fills these)
    repo: YOUR_GITHUB_REPO_URL
    branch: main
    
    # Dockerfile location (default is ./Dockerfile)
    dockerfilePath: ./Dockerfile
    
    # Build command (if needed)
    # buildCommand: "echo 'Docker build is standard'"
    
    # Port configuration
    startCommand: python start_render.py
    
    # Environment variables - FILL THESE IN:
    envVars:
      - key: LLM_PROVIDER
        value: openai  # or gemini, openrouter
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false  # Set to true if you have it in Render secrets
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: "10000"  # Render assigns a random port, use $PORT instead
      - key: DATABASE_PATH
        value: /tmp/rag_pipeline.db
      - key: VECTOR_STORE_PATH
        value: /tmp/faiss_index
      - key: FRONTEND_PORT
        value: "10000"
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Scaling
    numInstances: 1
    maxInstances: 3

# ============================================================================
# DATABASE SERVICE (Optional - if you want PostgreSQL instead of SQLite)
# ============================================================================
# Uncomment this section if you want to use PostgreSQL on Render
# Otherwise, SQLite will work fine in /tmp/

# databases:
#   - name: smart-rag-db
#     plan: standard
#     region: oregon
#     ipAllowList: []  # Allow all IPs from the web service

# ============================================================================
# ENVIRONMENT VARIABLES SETUP GUIDE
# ============================================================================
# 1. Log in to Render Dashboard
# 2. Go to your Web Service
# 3. Click "Environment"
# 4. Add these variables:
#
#    For OpenAI:
#    - OPENAI_API_KEY=sk-your-key-here
#    Get key from: https://platform.openai.com/api-keys
#
#    For Google Gemini:
#    - GOOGLE_API_KEY=your-key-here
#    Get key from: https://makersuite.google.com/app/apikey
#
#    For OpenRouter (RECOMMENDED - cheapest):
#    - OPENROUTER_API_KEY=sk-or-your-key-here
#    Get key from: https://openrouter.ai/keys
#
# ============================================================================

# ============================================================================
# DEPLOYMENT CHECKLIST
# ============================================================================
# Before deploying:
# ✅ Push code to GitHub
# ✅ Create Render account (https://render.com)
# ✅ Get API keys from your chosen LLM provider
# ✅ Update this file with correct repo URL and settings
# ✅ Set environment variables in Render dashboard
#
# Common issues:
# ❌ Port conflicts: Render uses $PORT, not hardcoded 8000/3000
# ❌ Database not persisting: Use /tmp for temp files, managed DB for persistence
# ❌ Dependencies missing: requirements.txt must be in root directory
# ✅ Both fixed in this setup!
#
# ============================================================================
