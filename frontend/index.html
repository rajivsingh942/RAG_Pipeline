<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart RAG App - Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #f0f0f0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status-bar {
            padding: 10px 20px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .status-dot.active {
            background: #51cf66;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.user .content {
            background: #667eea;
            color: white;
            border-radius: 15px 15px 0 15px;
        }

        .message.assistant .content {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 15px 15px 15px 0;
        }

        .message .content {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message .timestamp {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            background: white;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fff3cd;
            color: #856404;
            padding: 12px 16px;
            border-radius: 5px;
            border-left: 4px solid #ffc107;
            margin-bottom: 15px;
        }

        .error-message.critical {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .welcome-message h2 {
            margin-bottom: 10px;
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .message .content {
                max-width: 90%;
            }

            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Smart RAG App</h1>
            <p>Ask questions about your documents</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot" id="statusDot"></span>
                <span>Backend: <strong id="backendStatus">Checking...</strong></span>
            </div>
            <div class="status-item">
                <span>📂 Sources: <strong id="sourceCount">Loading...</strong></span>
            </div>
            <div class="status-item">
                <span>💬 Chat: <strong id="chatStatus">Ready</strong></span>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome-message">
                <h2>Welcome to Smart RAG</h2>
                <p>Your AI assistant is ready to answer questions about your documents.</p>
                <p style="margin-top: 10px; font-size: 12px;">Make sure the backend is running: <code>python backend/run.py</code></p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <input 
                    type="text" 
                    id="questionInput" 
                    placeholder="Ask a question about your documents..." 
                    autocomplete="off"
                >
                <button id="sendBtn" onclick="sendQuestion()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let conversationId = null;
        let isWaitingForResponse = false;

        // Initialize on page load
        window.addEventListener('load', () => {
            checkBackendStatus();
            initializeChat();
            setupKeyboardShortcuts();
        });

        // Keyboard shortcut (Enter to send)
        function setupKeyboardShortcuts() {
            document.getElementById('questionInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !isWaitingForResponse) {
                    sendQuestion();
                }
            });
        }

        // Check backend status
        async function checkBackendStatus() {
            try {
                const response = await fetch(`${API_URL}/health`, { timeout: 5000 });
                const data = await response.json();
                
                document.getElementById('statusDot').classList.add('active');
                document.getElementById('backendStatus').textContent = 'Connected';
                
                // Get stats
                getSystemStats();
            } catch (error) {
                document.getElementById('statusDot').classList.remove('active');
                document.getElementById('backendStatus').textContent = 'Disconnected';
                showError('Backend is not running. Please start it with: python backend/run.py', true);
            }
        }

        // Get system statistics
        async function getSystemStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const data = await response.json();
                const embeddings = data.vector_store?.total_embeddings || 0;
                document.getElementById('sourceCount').textContent = `${embeddings} embeddings`;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        // Initialize chat
        async function initializeChat() {
            try {
                // Get list of data sources
                const sourcesResponse = await fetch(`${API_URL}/api/sources`);
                const sources = await sourcesResponse.json();
                
                if (sources.length === 0) {
                    showError('No data sources found. Please index some documents first.', true);
                    return;
                }

                // Get source IDs
                const sourceIds = sources.map(s => s.id);

                // Create conversation
                const response = await fetch(`${API_URL}/api/conversations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: 'Chat Session',
                        data_source_ids: sourceIds
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    conversationId = data.id;
                    
                    // Clear welcome message
                    const chatArea = document.getElementById('chatArea');
                    if (chatArea.querySelector('.welcome-message')) {
                        chatArea.innerHTML = '';
                    }

                    addMessage('Welcome! I\'m here to help — what\'s on your mind today?', 'assistant');
                } else {
                    showError('Failed to initialize chat conversation');
                }
            } catch (error) {
                showError('Error initializing chat: ' + error.message, true);
            }
        }

        // Send question
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();

            if (!question) return;
            if (isWaitingForResponse) return;
            if (!conversationId) {
                showError('Chat not initialized. Please refresh the page.');
                return;
            }

            // Add user message
            addMessage(question, 'user');
            input.value = '';
            input.disabled = true;
            document.getElementById('sendBtn').disabled = true;
            isWaitingForResponse = true;

            // Add typing indicator
            const typingId = addTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/api/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversation_id: conversationId,
                        message: question,
                        temperature: 0.7,
                        use_stream: true
                    })
                });

                if (response.ok) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullResponse = '';

                    // Remove typing indicator
                    document.getElementById(typingId)?.remove();

                    // Create message container
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message assistant';
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    messageDiv.appendChild(contentDiv);
                    document.getElementById('chatArea').appendChild(messageDiv);

                    // Stream response
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value);
                        fullResponse += chunk;
                        contentDiv.textContent = fullResponse;

                        // Auto scroll
                        document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
                    }
                } else {
                    // Remove typing indicator
                    document.getElementById(typingId)?.remove();
                    const errorData = await response.json().catch(() => ({}));
                    showError(`Error: ${errorData.detail?.[0]?.msg || response.statusText}`);
                }
            } catch (error) {
                // Remove typing indicator
                document.getElementById(typingId)?.remove();
                showError('Network error: ' + error.message);
            } finally {
                input.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                isWaitingForResponse = false;
                input.focus();
            }
        }

        // Add message to chat
        function addMessage(text, role) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.textContent = text;
            messageDiv.appendChild(contentDiv);

            const timeDiv = document.createElement('div');
            timeDiv.className = 'timestamp';
            timeDiv.textContent = new Date().toLocaleTimeString();
            messageDiv.appendChild(timeDiv);

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Add typing indicator
        function addTypingIndicator() {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typing-' + Date.now();

            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            messageDiv.appendChild(typingDiv);

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            return messageDiv.id;
        }

        // Show error message
        function showError(message, critical = false) {
            const chatArea = document.getElementById('chatArea');
            const errorDiv = document.createElement('div');
            errorDiv.className = critical ? 'error-message critical' : 'error-message';
            errorDiv.textContent = message;
            chatArea.insertBefore(errorDiv, chatArea.firstChild);
        }

        // Periodically check backend status
        setInterval(checkBackendStatus, 10000);
    </script>
</body>
</html>
